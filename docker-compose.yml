services:

  # ─── Banco de dados ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: catched_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microserviço de embedding (Python/FastAPI) ───────────────
  embedding:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    container_name: catched_embedding
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.72}
      SIMILARITY_UNCERTAIN: ${SIMILARITY_UNCERTAIN:-0.62}
      LOCATION_WEIGHT: ${LOCATION_WEIGHT:-0.15}
      UPLOAD_DIR: uploads
    volumes:
      - embedding_uploads:/app/uploads
      - huggingface_cache:/root/.cache/huggingface  # modelo cacheado entre restarts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # tempo pra carregar o modelo na primeira vez

  # ─── Backend principal (Node.js/Express) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catched_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      EMBEDDING_SERVICE_URL: http://embedding:8000
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      embedding:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  postgres_data:
  embedding_uploads:
  huggingface_cache:
